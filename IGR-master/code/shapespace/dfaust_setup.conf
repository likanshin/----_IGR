
train{
    d_in = 3
    plot_frequency = 50
    checkpoint_frequency = 50
    status_frequency = 20
    preprocess = True
    latent_size = 256
    dataset_path = /home/rikanshin/bi_she/IGR-master/data/d-faust-processed/dfaust_processed
    dataset = datasets.dfaustdataset.DFaustDataSet
    weight_decay = 0
    use_amp = True
    compute_eval_metrics = True
    eval_num_samples = 100000
    eval_f_threshold = 0.01
    learning_rate_schedule = [{
                                "Type" : "Step",
			                    "Initial" : 0.002,
			                    "Interval" : 500,
			                    "Factor" : 0.5
			                    },
                                {
                                "Type" : "Step",
                                "Initial" : 0.001,
                                "Interval" : 500,
                                "Factor" : 0.5
                                }]
    #network_class = model.network.ImplicitNet
    # Instant-NGP + DiGS：双路径哈希编码网络
    network_class = model.hash_encoding.HashGridImplicitNet
    bbox_min = -1.8
    bbox_max = 1.8
}

plot{
    resolution = 100
    mc_value = 0.0
    is_uniform_grid = False
    verbose = False
    save_html = True
    save_ply = True
    overwrite = True
}
network{
    inputs{
        # 标准 MLP 配置（使用 ImplicitNet 时生效）
        # dims = [ 512, 512, 512, 512, 512, 512, 512, 512 ]
        # skip_in = [4]
        # geometric_init= True
        # radius_init = 1
        # beta=100
        
        # Instant-NGP 哈希编码网络配置（使用 HashGridImplicitNet 时生效）
        n_levels = 16
        n_features_per_level = 2
        log2_hashmap_size = 19
        base_resolution = 16
        per_level_scale = 2.0
        hidden_dim = 128
        num_layers = 2
        num_output_layers = 2
    }
    sampler{
        # DiGS 自适应表面感知采样
        sampler_type = AdaptiveSurfaceSampler
        properties{
            global_sigma = 1.8
            local_sigma = 0.01
            adaptive_ratio = 0.3
            curvature_weight = 0.5
            }
    }
    loss{
        lambda = 0.2          # DiGS 归一化梯度损失权重（提高，加强Eikonal）
        normals_lambda = 0.5  # DiGS 余弦相似度法向量权重
        latent_lambda = 1e-4  # latent 正则化权重
        div_lambda = 1e-7
        grad_warmup_epochs = 0 # 梯度损失的预热期长度，可设为 100-200，让训练更稳定起步
        div_warmup_epochs = 0  #散度损失的预热期长度，建议设为 200-500
        grad_clip_norm = 2.0   
    }
}
